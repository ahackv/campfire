<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beneath the Surface Arcade</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 16px; background: radial-gradient(circle at 20% 20%, #2b2240, #120d21 60%, #0b0912); color: #f7f3ff; }
      .app { width: min(1260px, 100%); border: 1px solid rgba(201, 168, 244, 0.35); border-radius: 16px; overflow: hidden; background: rgba(15, 10, 25, 0.95); }
      .header { padding: 14px 18px; border-bottom: 1px solid rgba(185, 155, 232, 0.25); }
      .header h1 { margin: 0; font-size: clamp(1.2rem, 2.4vw, 1.6rem); }
      .header p { margin: 6px 0 0; color: #d9cbef; }

      .menu { padding: 16px; }
      .cards { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
      .card { border: 1px solid rgba(220, 201, 248, 0.35); border-radius: 12px; background: rgba(255, 255, 255, 0.04); padding: 10px; display: grid; gap: 8px; }
      .thumb { width: 100%; height: 92px; image-rendering: pixelated; border: 1px solid rgba(220, 201, 248, 0.25); border-radius: 8px; background: #1d1533; }
      .badge { width: fit-content; font-size: .72rem; border: 1px solid rgba(220, 201, 248, 0.35); border-radius: 999px; padding: 2px 8px; background: rgba(173,130,235,0.2); }
      h3 { margin: 0; font-size: 1rem; }
      .card p { margin: 0; color: #dacfee; font-size: .9rem; }

      button, .linkBtn {
        border: 1px solid rgba(220, 201, 248, 0.45);
        border-radius: 10px;
        background: rgba(173, 130, 235, 0.22);
        color: #fff;
        padding: 9px 12px;
        cursor: pointer;
        text-decoration: none;
        width: fit-content;
      }

      .hidden { display: none !important; }
      .gameView { min-height: 720px; display: grid; grid-template-rows: auto 1fr; }
      .topbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid rgba(185, 155, 232, 0.25); }
      .topbar small { color: #d7caed; }
      .layout { display: grid; grid-template-columns: 1.15fr .85fr; min-height: 660px; }
      .play { border-right: 1px solid rgba(185, 155, 232, 0.2); padding: 12px; display: grid; gap: 10px; align-content: start; }
      .chatZone { display: grid; grid-template-rows: auto 1fr auto; }
      .panel { border: 1px solid rgba(220, 201, 248, 0.35); border-radius: 10px; background: rgba(255,255,255,.04); padding: 10px; }
      .stats { display: grid; gap: 6px; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
      .stat { color: #e9e0f8; font-size: .92rem; }
      #gameCanvas { width: 100%; max-width: 760px; height: 340px; border: 1px solid rgba(220, 201, 248, 0.45); border-radius: 10px; background: #11192d; image-rendering: pixelated; box-shadow: inset 0 0 40px rgba(0,0,0,0.35), 0 0 20px rgba(151,121,201,0.2); }
      .controls { display: flex; flex-wrap: wrap; gap: 8px; }
      .avatar { display: grid; grid-template-columns: 92px 1fr; gap: 10px; align-items: center; border-bottom: 1px solid rgba(185, 155, 232, 0.25); padding: 10px; }
      #botFace { width: 80px; height: 80px; image-rendering: pixelated; border: 1px solid rgba(220, 201, 248, 0.35); border-radius: 8px; background: #18132b; }
      #botMood { color: #d8caee; font-size: .9rem; }
      .chat { overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
      .bubble { max-width: 86%; border-radius: 10px; padding: 8px 10px; line-height: 1.4; }
      .bot { align-self: flex-start; background: rgba(142,118,178,.25); border: 1px solid rgba(195,164,242,.35); }
      .you { align-self: flex-end; background: rgba(80,164,149,.2); border: 1px solid rgba(134,224,207,.35); }
      .composer { display: grid; grid-template-columns: 1fr auto; gap: 8px; border-top: 1px solid rgba(185,155,232,.25); padding: 10px; }
      input { border: 1px solid rgba(220, 201, 248, 0.45); border-radius: 10px; background: rgba(247,236,255,.08); color: #fff; padding: 10px; }
      @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } .play { border-right: none; border-bottom: 1px solid rgba(185, 155, 232, 0.2);} }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>🕹️ Beneath the Surface Arcade</h1>
        <p>5 polished game options + bot teammate chat in every mode.</p>
      </header>

      <section id="menu" class="menu">
        <div class="cards" id="cards"></div>
      </section>

      <section id="gameView" class="gameView hidden">
        <div class="topbar">
          <small id="modeTitle">Mode</small>
          <div style="display:flex; gap:8px;"><button id="musicBtn">🎵 Music: Off</button><button id="backBtn">← Back to menu</button></div>
        </div>
        <div class="layout">
          <section class="play">
            <div id="summary" class="panel"></div>
            <div id="stats" class="panel stats"></div>
            <canvas id="gameCanvas" width="760" height="340"></canvas>
            <div id="controls" class="panel controls"></div>
            <div id="status" class="panel"></div>
          </section>
          <section class="chatZone">
            <div class="avatar">
              <canvas id="botFace" width="32" height="32"></canvas>
              <div id="botMood">Bot teammate online.</div>
            </div>
            <section id="chat" class="chat" aria-live="polite"></section>
            <form id="composer" class="composer">
              <input id="msgInput" placeholder="Message bot teammate..." />
              <button type="submit">Send</button>
            </form>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="./game.js"></script>
  </body>
</html>
