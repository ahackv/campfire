<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game 7 — Read Between the Lines</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #2a2140 0%, #151024 45%, #0f0b17 100%);
        color: #f8f4ff;
        padding: 18px;
      }
      .game {
        width: min(920px, 100%);
        border: 1px solid rgba(207, 170, 255, 0.35);
        border-radius: 18px;
        background: rgba(15, 8, 26, 0.94);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
        overflow: hidden;
      }
      .header {
        padding: 16px 18px;
        border-bottom: 1px solid rgba(186, 158, 233, 0.25);
        background: linear-gradient(180deg, rgba(155, 115, 214, 0.2), rgba(23, 12, 38, 0));
      }
      .header h1 { margin: 0 0 4px; font-size: clamp(1.1rem, 2.2vw, 1.5rem); }
      .header p { margin: 0; color: #d8caef; }
      .stats { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
      .chip {
        border: 1px solid rgba(232, 215, 255, 0.3);
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 0.9rem;
        color: #eedfff;
        background: rgba(255, 255, 255, 0.05);
      }
      .chat {
        height: min(55vh, 500px);
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .bubble { max-width: 82%; padding: 12px 14px; border-radius: 14px; line-height: 1.45; }
      .char { align-self: flex-start; background: rgba(142, 118, 178, 0.25); border: 1px solid rgba(195, 164, 242, 0.35); }
      .player { align-self: flex-end; background: rgba(80, 164, 149, 0.22); border: 1px solid rgba(134, 224, 207, 0.35); }
      .hint { font-size: 0.88rem; color: #d4c7eb; margin-top: 6px; opacity: 0.9; }
      .quick {
        padding: 10px 14px;
        border-top: 1px solid rgba(186, 158, 233, 0.25);
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .quick button {
        border: 1px solid rgba(220, 201, 248, 0.42);
        border-radius: 999px;
        background: rgba(247, 236, 255, 0.08);
        color: #f7f0ff;
        padding: 6px 12px;
        font-size: 0.85rem;
        cursor: pointer;
      }
      .composer {
        padding: 12px 14px 16px;
        border-top: 1px solid rgba(186, 158, 233, 0.25);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }
      input {
        width: 100%;
        border: 1px solid rgba(220, 201, 248, 0.45);
        border-radius: 12px;
        background: rgba(247, 236, 255, 0.08);
        color: #f7f0ff;
        padding: 11px 12px;
        font-size: 0.97rem;
      }
      .send {
        border: 1px solid rgba(220, 201, 248, 0.45);
        border-radius: 12px;
        background: rgba(173, 130, 235, 0.22);
        color: #fff;
        padding: 10px 14px;
        cursor: pointer;
      }
      .ending {
        padding: 14px 16px 18px;
        border-top: 1px solid rgba(186, 158, 233, 0.25);
        background: rgba(151, 121, 201, 0.08);
      }
      .ending strong { font-size: 1.1rem; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <main class="game">
      <header class="header">
        <h1>💬 Game 7 — Read Between the Lines</h1>
        <p>Beneath the surface: what people feel vs what they say.</p>
        <div class="stats">
          <span class="chip" id="round">Round: 1 / 5</span>
          <span class="chip" id="trust">Connection: 0</span>
          <span class="chip" id="signal">Signal: hard to read</span>
        </div>
      </header>

      <section id="chat" class="chat" aria-live="polite"></section>
      <section id="quick" class="quick" aria-label="Quick prompt ideas"></section>
      <form id="composer" class="composer" autocomplete="off">
        <input id="reply" name="reply" placeholder="Type any response..." />
        <button class="send" type="submit">Send</button>
      </form>
      <section id="ending" class="ending hidden"></section>
    </main>

    <script type="module" src="./game.js"></script>
  </body>
</html>
