<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beneath the Surface — Meme Marathon</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: radial-gradient(circle at 20% 20%, #2a2140 0%, #151024 45%, #0f0b17 100%); color: #f8f4ff; display: grid; place-items: center; padding: 16px; }
      .game { width: min(1180px, 100%); border: 1px solid rgba(207,170,255,.35); border-radius: 18px; background: rgba(15,8,26,.94); overflow: hidden; box-shadow: 0 18px 50px rgba(0,0,0,.45); }
      .header { padding: 14px 18px; border-bottom: 1px solid rgba(186,158,233,.25); }
      .header h1 { margin: 0; font-size: clamp(1.1rem,2.2vw,1.45rem); }
      .header p { margin: 6px 0 0; color: #d7c9ef; }
      .layout { display: grid; grid-template-columns: 1.05fr 1fr; min-height: 680px; }
      .left { border-right: 1px solid rgba(186,158,233,.2); padding: 14px; }
      .right { display: grid; grid-template-rows: auto 1fr auto; }
      .board { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .panel { border: 1px solid rgba(220,201,248,.35); border-radius: 14px; background: rgba(255,255,255,.04); padding: 12px; }
      .panel h2 { margin: 0 0 8px; font-size: 1.02rem; }
      .stat { font-size: .94rem; margin: 3px 0; color: #e8def8; }
      .hot { color: #ffe28f; }
      .harvest { margin-top: 10px; width: 100%; border: 1px solid rgba(222,209,248,.46); border-radius: 12px; background: rgba(173,130,235,.25); color: #fff; font-size: .96rem; padding: 10px; cursor: pointer; }
      .upgrades { margin-top: 10px; display: grid; gap: 8px; }
      .upgrades button { border: 1px solid rgba(220,201,248,.38); border-radius: 10px; background: rgba(247,236,255,.08); color: #f7f0ff; padding: 8px; font-size: .9rem; text-align: left; cursor: pointer; }
      .avatarBar { display: grid; grid-template-columns: 110px 1fr; gap: 10px; padding: 12px; border-bottom: 1px solid rgba(186,158,233,.25); align-items: center; }
      #face { width: 96px; height: 96px; image-rendering: pixelated; border: 1px solid rgba(220,201,248,.35); border-radius: 8px; background: #151222; }
      .avatarText { font-size: .92rem; color: #d9cff0; }
      .chat { overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
      .bubble { max-width: 88%; border-radius: 12px; padding: 10px 12px; line-height: 1.4; }
      .char { align-self: flex-start; background: rgba(142,118,178,.25); border: 1px solid rgba(195,164,242,.35); }
      .player { align-self: flex-end; background: rgba(80,164,149,.22); border: 1px solid rgba(134,224,207,.35); }
      .hint { margin-top: 5px; font-size: .84rem; color: #d4c7eb; opacity: .88; }
      .composer { display: grid; grid-template-columns: 1fr auto; gap: 8px; padding: 12px; border-top: 1px solid rgba(186,158,233,.25); }
      input { border: 1px solid rgba(220,201,248,.45); border-radius: 12px; background: rgba(247,236,255,.08); color: #f7f0ff; padding: 10px 12px; font-size: .96rem; }
      .send { border: 1px solid rgba(220,201,248,.45); border-radius: 12px; background: rgba(173,130,235,.22); color: #fff; padding: 10px 14px; cursor: pointer; }
      .ending { margin-top: 10px; border-radius: 12px; padding: 10px 12px; border: 1px solid rgba(220,201,248,.32); background: rgba(255,255,255,.04); }
      .hidden { display: none; }
      @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } .left { border-right: none; border-bottom: 1px solid rgba(186,158,233,.2); } }
    </style>
  </head>
  <body>
    <main class="game">
      <header class="header">
        <h1>Beneath the Surface — Meme Marathon</h1>
        <p>Longer run, more jokes, and a pixel teammate face that talks while chatting.</p>
      </header>
      <section class="layout">
        <section class="left">
          <div class="board">
            <article class="panel">
              <h2>You</h2>
              <div class="stat" id="youSalvage">Salvage: 0</div>
              <div class="stat" id="youDepth">Depth: 1</div>
              <div class="stat" id="youClick">Per click: 1</div>
              <div class="stat" id="youAuto">Per sec: 0</div>
              <div class="stat hot" id="combo">Combo: x1.00</div>
              <div class="stat hot" id="boost">Boost: none</div>
              <button id="harvestBtn" class="harvest">HARVEST</button>
              <div class="upgrades">
                <button id="drillBtn">Drill +1/click (15)</button>
                <button id="autoBtn">Collector +1/sec (45)</button>
                <button id="depthBtn">Dive deeper (120)</button>
              </div>
            </article>
            <article class="panel">
              <h2>Teammate (online)</h2>
              <div class="stat" id="rivalSalvage">Salvage: 0</div>
              <div class="stat" id="rivalDepth">Depth: 1</div>
              <div class="stat" id="rivalRate">Per sec: 1</div>
              <div class="stat" id="phase">Signal: vibing</div>
              <div class="ending hidden" id="result"></div>
            </article>
          </div>
        </section>
        <section class="right">
          <section class="avatarBar">
            <canvas id="face" width="32" height="32" aria-label="pixel teammate face"></canvas>
            <div class="avatarText" id="avatarText">Teammate feed online.</div>
          </section>
          <section id="chat" class="chat" aria-live="polite"></section>
          <form id="composer" class="composer" autocomplete="off">
            <input id="reply" placeholder="Type to teammate..." />
            <button class="send" type="submit">Send</button>
          </form>
        </section>
      </section>
    </main>
    <script type="module" src="./game.js"></script>
  </body>
</html>
